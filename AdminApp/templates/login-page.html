<!DOCTYPE html>
{%load static%}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'login_page/css/style.css'%}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<div class="login-container">
    <div class="login-card">
        <h2>Log In</h2>

        <form method="post" action="{% url 'login_fn' %}" >
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="username">
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required>
                <label>Password</label>
                <span class="toggle" onclick="togglePassword()">👁</span>
            </div>

            <button class="rounded-5" type="submit">Login</button>
            
                
        </form>
    </div>
</div>

<!-- JS -->
{% comment %} <script src="{% static 'login_page/js/script.js' %}"></script> {% endcomment %}

</body>

</html>
