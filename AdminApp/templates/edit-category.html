{%extends 'dashboard.html'%}
{%block content%}
<html>
    <head></head>
    <body>
        <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Add Categories</h4>
                    <form class="forms-sample" method="post" action="{%url 'update_category' category_id=category.id%}" enctype="multipart/form-data">
                        {% csrf_token %}
                      <div class="form-group">
                        <label for="exampleInputUsername1">Category Name</label>
                        <input type="text" class="form-control" name="category_name" value={{category.Category_Name}}>
                      </div>
                      <div class="form-group">
                        <label for="exampleInputEmail1">Description</label>
                        <textarea type="" class="form-control" name="category_description" >{{category.Category_Description}}</textarea>
                      </div>
                      <div class="form-group">
                        <label for="exampleInputUsername1">Category Image</label>
                        <br>
                        <img src="{{category.Category_Image.url}}" width="100px" heigth="100px">
                        <input type="file" class="mt-3 form-control" name="category_image" >
                      </div>
                      
                      
                      <button type="submit" class="btn btn-primary mr-2">Submit</button>
                      <button class="btn btn-dark">Cancel</button>
                    </form>
                  </div>
                </div>
    </body>
</html>
{%endblock%}
